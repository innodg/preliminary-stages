name: 'Connect Four 게임 개발 인증'

description: Connect Four 게임 개발 결과를 인증하기 위한 이슈 템플릿입니다.

title: "[Connect Four 게임 개발 인증] "

labels:
  - game
  - quest-2
  - request

body:
  - type: markdown
    attributes:
      value: |
        <br/>
        환영합니다! Connect Four 게임 개발 결과를 인증하기 위해 아래 양식을 작성해주세요.
        <br/>

        **안내**:

        - **[중요] GitHub 조직에 초대장을 받고 수락한 후에 Connect Four 게임 개발 인증을 진행할 수 있습니다.**
        - **[중요] 제출자와 응시자 정보가 다를 경우, 인증을 완료하더라도 부정행위로 간주하고 추후 제명 조치할 수 있습니다.**
        - **[중요] Connect Four 게임 개발 결과물은 반드시 본인의 GitHub 리포지토리에 저장해 두어야 합니다.**

  - type: dropdown
    id: request-type
    attributes:
      label: 요청 유형
      options:
        - Connect Four 게임 개발 인증
      default: 0
    validations:
      required: true

  - type: input
    id: github-profile-link
    attributes:
      label: GitHub 프로필 링크
      placeholder: https://github.com/octocat
    validations:
      required: true

  - type: input
    id: connect-four-repo-link
    attributes:
      label: Connect Four 게임 개발 결과물 링크
      placeholder: https://github.com/octocat/connect-four
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        <br/>

        **안내**:

        - **[중요] GitHub 조직에 초대장을 받고 수락한 후에 Connect Four 게임 개발 인증을 진행할 수 있습니다.**
        - **[중요] 제출자와 응시자 정보가 다를 경우, 인증을 완료하더라도 부정행위로 간주하고 추후 제명 조치할 수 있습니다.**
        - **[중요] Connect Four 게임 개발 결과물은 반드시 본인의 GitHub 리포지토리에 저장해 두어야 합니다.**

        감사합니다!
