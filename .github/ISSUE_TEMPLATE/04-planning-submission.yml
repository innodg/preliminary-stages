name: '바이브 벤처 프로젝트 기획서 제출'

description: 바이브 벤처 프로젝트 기획서를 제출하기 위한 이슈 템플릿입니다.

title: "[바이브 벤처 프로젝트 기획서 제출] "

labels:
  - planning
  - quest-2
  - request

body:
  - type: markdown
    attributes:
      value: |
        <br/>
        환영합니다! 바이브 벤처 프로젝트 기획서를 제출하기 위해 아래 양식을 작성해주세요.
        <br/>

        **안내**:

        - **[중요] GitHub 조직에 초대장을 받고 수락한 후에 바이브 벤처 프로젝트 기획서 제출을 진행할 수 있습니다.**
        - **[중요] 제출자와 응시자 정보가 다를 경우, 인증을 완료하더라도 부정행위로 간주하고 추후 제명 조치할 수 있습니다.**

  - type: dropdown
    id: request-type
    attributes:
      label: 요청 유형
      options:
        - 바이브 벤처 프로젝트 기획서 제출
      default: 0
    validations:
      required: true

  - type: input
    id: github-profile-link
    attributes:
      label: GitHub 프로필 링크
      placeholder: https://github.com/octocat
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        <br/>

        아래 링크를 통해 기획서를 제출해 주세요.

        <a href="https://forms.cloud.microsoft/r/rZ0WCUkfit" target="_blank">바이브 벤처 프로젝트 기획서 제출 양식</a>

  - type: dropdown
    id: privacy-submission-confirmation
    attributes:
      label: 위 바이브 벤처 프로젝트 기획서 제출 양식을 제출하셨나요?
      options:
        - 선택
        - 예
        - 아니오
      default: 0
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        <br/>

        **안내**:

        - **[중요] GitHub 조직에 초대장을 받고 수락한 후에 바이브 벤처 프로젝트 기획서 제출을 진행할 수 있습니다.**
        - **[중요] 제출자와 응시자 정보가 다를 경우, 인증을 완료하더라도 부정행위로 간주하고 추후 제명 조치할 수 있습니다.**

        감사합니다!
