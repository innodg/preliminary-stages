name: GitHub 조직 초대 요청

description: GitHub 조직에 초대를 요청하기 위한 이슈 템플릿입니다.

title: "[GitHub 조직 초대 요청] "

labels:
  - invitation
  - quest-1
  - request

body:
  - type: markdown
    attributes:
      value: |
        <br/>
        환영합니다! GitHub 조직에 초대를 요청하기 위해 아래 양식을 작성해주세요.

        **안내**:

        - **제출자 본인 확인 차원**에서 지원서 제출시 입력한 정보와 일치해야만 초대장을 발송할 수 있습니다.
        - 초대 요청을 제출하면 GitHub 계정을 만들 때 사용한 이메일 주소로 초대장을 발송합니다.
        - 초대장을 수락하면 조직에 참여할 수 있습니다. 메일이 도착하지 않으면 스팸메일함도 확인해 보세요.

  - type: dropdown
    id: request-type
    attributes:
      label: 요청 유형
      options:
        - GitHub 조직 초대 요청
    validations:
      required: true

  - type: dropdown
    id: organization
    attributes:
      label: 조직
      options:
        - https://github.com/innodg
    validations:
      required: true

  - type: input
    id: github-profile-link
    attributes:
      label: GitHub 프로필 링크
      placeholder: https://github.com/octocat
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: 이름
      placeholder: 김개발
    validations:
      required: true

  - type: input
    id: school
    attributes:
      label: 학교명
      placeholder: 바이브고등학교 (지원서 작성시 입력한 학교명과 동일하게 작성해주세요)
    validations:
      required: true

  - type: input
    id: student-contact
    attributes:
      label: 학생 연락처
      placeholder: 010-1234-5678 (지원서 작성시 입력한 학생 연락처와 동일하게 작성해주세요. 지원서에 학생 연락처를 기입하지 않은 경우 생략 가능합니다.)
    validations:
      required: false

  - type: input
    id: parent-contact
    attributes:
      label: 학부모 연락처
      placeholder: 010-1234-5678 (지원서 작성시 입력한 학부모 연락처와 동일하게 작성해주세요. 지원서에 학부모 연락처를 기입하지 않은 경우 생략 가능합니다.)
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        <br/>

        **안내**:

        - **제출자 본인 확인 차원**에서 지원서 제출시 입력한 정보와 일치해야만 초대장을 발송할 수 있습니다.
        - 초대 요청을 제출하면 GitHub 계정을 만들 때 사용한 이메일 주소로 초대장을 발송합니다.
        - 초대장을 수락하면 조직에 참여할 수 있습니다. 메일이 도착하지 않으면 스팸메일함도 확인해 보세요.

        감사합니다!
